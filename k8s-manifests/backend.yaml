apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-2-sjb-backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 987470856504.dkr.ecr.us-east-1.amazonaws.com/lab-2-sjb-backend-ecr-repo:latest
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: DATABASE_URL
              value: "postgresql://dbadmin:Admin12345@lab-2-sjb-rds-db.cobs4muue9yt.us-east-1.rds.amazonaws.com:5432/postgres?schema=public"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

---

apiVersion: v1
kind: Service
metadata:
  name: lab-2-sjb-backend-service
  namespace: default
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
