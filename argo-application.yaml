apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 3tier-architecture
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/SJBauer0/Lab_2_3Tier_Architecture.git"
    targetRevision: HEAD
    path: k8s-manifests
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
